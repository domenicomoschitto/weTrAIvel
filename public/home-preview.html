<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Home Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f0f5; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  .navbar {
    background: #0a0a0f;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .navbar-logo { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
  .navbar-logo span { color: #2563eb; }
  .page { max-width: 680px; margin: 0 auto; padding: 28px 16px 100px; }
  h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 700; letter-spacing: -0.03em; color: #0a0a0f; }
  .sub { color: #6b7280; font-size: 0.85rem; margin-top: 4px; margin-bottom: 28px; }
  .section-label { font-size: 0.72rem; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; font-family: 'Syne', sans-serif; margin-bottom: 8px; }
  .trips { display: flex; flex-direction: column; gap: 12px; }
  .trip-card { border-radius: 14px; overflow: hidden; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.08); border: 1px solid #e4e4ef; }
  .card-cover { padding: 24px 20px 20px; display: flex; align-items: flex-start; justify-content: space-between; min-height: 96px; }
  .badge { display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; margin-bottom: 10px; font-family: 'Syne', sans-serif; }
  .badge-blue { background: rgba(37,99,235,0.9); color: #fff; }
  .badge-past { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }
  .card-name { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; line-height: 1.2; }
  .card-emoji { font-size: 2rem; flex-shrink: 0; margin-left: 12px; margin-top: 2px; opacity: 0.9; }
  .card-footer { background: #fff; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .card-meta { display: flex; align-items: center; gap: 12px; }
  .meta-date { font-size: 0.78rem; color: #6b7280; }
  .meta-stops { font-size: 0.72rem; font-weight: 600; background: rgba(37,99,235,0.1); color: #2563eb; padding: 2px 8px; border-radius: 20px; }
  .arrow { color: #9ca3af; font-size: 1rem; }
  .past-section { margin-top: 16px; }
  .past-trips { display: flex; flex-direction: column; gap: 12px; }
  .past-card { opacity: 0.65; }
  .fab { position: fixed; bottom: 24px; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: #0a0a0f; color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 300; box-shadow: 0 4px 20px rgba(10,10,15,0.3); }
</style>
</head>
<body>
<nav class="navbar">
  <span class="navbar-logo">🧳 weTrAi<span>vel</span></span>
  <span style="color:rgba(255,255,255,0.4);font-size:1rem">⏻</span>
</nav>

<div class="page">
  <h1>Good afternoon.</h1>
  <p class="sub">2 upcoming · 1 past</p>

  <div class="section-label">Upcoming</div>
  <div class="trips">

    <div class="trip-card">
      <div class="card-cover" style="background: linear-gradient(135deg, #0f2027, #203a43, #2c5364)">
        <div>
          <div class="badge badge-blue">In 12 days</div>
          <div class="card-name">Italy 2026</div>
        </div>
        <div class="card-emoji">🇮🇹</div>
      </div>
      <div class="card-footer">
        <div class="card-meta">
          <span class="meta-date">📅 3 Jun – 14 Jun</span>
          <span class="meta-stops">3 stops</span>
        </div>
        <span class="arrow">›</span>
      </div>
    </div>

    <div class="trip-card">
      <div class="card-cover" style="background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460)">
        <div>
          <div class="badge badge-blue">In 45 days</div>
          <div class="card-name">Tokyo Summer</div>
        </div>
        <div class="card-emoji">🇯🇵</div>
      </div>
      <div class="card-footer">
        <div class="card-meta">
          <span class="meta-date">📅 7 Jul – 20 Jul</span>
          <span class="meta-stops">2 stops</span>
        </div>
        <span class="arrow">›</span>
      </div>
    </div>

  </div>

  <div class="past-section">
    <div class="section-label">Past</div>
    <div class="past-trips">
      <div class="trip-card past-card">
        <div class="card-cover" style="background: linear-gradient(135deg, #0a0a0f, #111118, #2563eb)">
          <div>
            <div class="badge badge-past">Completed</div>
            <div class="card-name">Barcelona 2025</div>
          </div>
          <div class="card-emoji">🇪🇸</div>
        </div>
        <div class="card-footer">
          <div class="card-meta">
            <span class="meta-date">📅 10 Sep – 17 Sep</span>
            <span class="meta-stops">1 stop</span>
          </div>
          <span class="arrow">›</span>
        </div>
      </div>
    </div>
  </div>
</div>

<button class="fab">+</button>
</body>
</html>
